{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 - Страница не найдена</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rubik', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;

            background-color: #0a0a0a; /* основной тёмный фон */
            background-image: url("data:image/svg+xml;utf8,..."),
                conic-gradient(
                    rgba(17,17,17,0.4) 0.25turn,
                    rgba(51,51,51,0.4) 0.25turn 0.5turn,
                    rgba(17,17,17,0.4) 0.5turn 0.75turn,
                    rgba(17,17,17,0.4) 0.75turn
                );

            background-size: auto, 4px 4px;
            background-repeat: repeat;

            animation: move404 6s linear infinite;
        }

        .container::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: linear-gradient(
                -62.5deg,
                lime,
                green,
                green,
                green,
                green,
                lime,
                green,
                green,
                green,
                green,
                lime
            );
            mix-blend-mode: multiply;
            background-size: 400%;
            background-position: 10%;
            animation: move-light 5s infinite;
        }
    
        .container::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.65); /* затемнение */
            z-index: 1;
        }

        @keyframes move404 {
            from {
                background-position:
                    0 0,
                    0;
            }
            to {
                background-position:
                    calc(84px * 4) calc(54px * 2),
                    0;
            }
        }

        @keyframes move-light {
            0% {
                background-position: 10%;
            }
            50% {
                background-position: 90%;
            }
            100% {
                background-position: 90%;
            }
        }

        .error-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 2rem;
        }   

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: #ffffff;
            text-shadow: 0 0 25px rgba(46, 213, 115, 0.4);
        }

        .error-emoji {
            font-size: 6rem;
            opacity: 1;
            display: block;
            margin: 1rem 0;
        }

        .error-title {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            opacity: 1;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .error-message {
            font-size: 1.2rem;
            color: #fff;
            opacity: 1;
            margin-bottom: 2rem;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .back-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #2ed573;
            background: transparent;
            border: 2px solid #2ed573;
            border-radius: 0.5rem;
            text-decoration: none;
            transition: all 0.3s;
            opacity: 0.8;
        }

        .back-btn:hover {
            background: #2ed573;
            color: #0a0f0d;
            opacity: 1;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(46, 213, 115, 0.3);
        }

        @media (max-width: 600px) {
            .error-code {
                font-size: 5rem;
            }
            .error-emoji {
                font-size: 4rem;
            }
            .error-title {
                font-size: 1.5rem;
            }
            .error-message {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-content">
            <div class="error-code">404</div>
            <span class="error-emoji">¯\_(ツ)_/¯</span>
            <h1 class="error-title">Упс! Страница пропала</h1>
            <p class="error-message">Кажется, эта страница ушла в отпуск без вести... или её съел баг!</p>
            <a href="/" class="back-btn">Вернуться домой</a>
        </div>
    </div>
</body>
</html>
