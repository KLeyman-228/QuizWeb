{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 - Страница не найдена</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rubik', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            background-color: #111;
            overflow: hidden;
        }

        .container::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url("/static/img/404-pattern.svg");
            background-size: 50px 50px;
            opacity: 0.1;
            animation: move404 4s linear infinite;
        }

        .container::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: linear-gradient(
                -62.5deg,
                lime,
                green,
                green,
                green,
                green,
                lime,
                green,
                green,
                green,
                green,
                lime
            );
            mix-blend-mode: multiply;
            background-size: 400%;
            background-position: 10%;
            opacity: 0.2;
            animation: move-light 5s infinite;
        }


        @keyframes move404 {
            from {
                background-position:
                    0 0,
                    0;
            }
            to {
                background-position:
                    calc(84px * 4) calc(54px * 2),
                    0;
            }
        }

        @keyframes move-light {
            0% {
                background-position: 10%;
            }
            50% {
                background-position: 90%;
            }
            100% {
                background-position: 90%;
            }
        }

        .error-content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
        }   

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: #2ed573;
            text-shadow: none;
            line-height: 1;
            margin-bottom: 0.5rem;
            letter-spacing: -0.05em;
        }

        .error-emoji {
            font-size: 6rem;
            color: #2ed573;
            display: block;
            margin: 1rem 0;
        }

        .error-title {
            font-size: 2rem;
            font-weight: 700;
            color: #2ed573;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .error-message {
            font-size: 1.2rem;
            color: #7bed9f;
            margin-bottom: 2rem;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .back-btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #2ed573;
            background: transparent;
            border: 2px solid #2ed573;
            border-radius: 0.5rem;
            text-decoration: none;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #2ed573;
            color: #111;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(46, 213, 115, 0.4);
        }

        @media (max-width: 600px) {
            .error-code {
                font-size: 5rem;
            }
            .error-emoji {
                font-size: 4rem;
            }
            .error-title {
                font-size: 1.5rem;
            }
            .error-message {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-content">
            <span class="error-emoji">¯\_(ツ)_/¯</span>
            <h1 class="error-title">Кто здесь?</h1>
            <p class="error-message">Кажется, эта страница ушла в отпуск без вести... или её съел баг!</p>
        </div>
    </div>
</body>
</html>
