{% extends "base.html" %}
{% block title %}Phys-Dev Quiz{% endblock %}
{% block content %}

<section class="hero-block">
    <h1 class="text-3xl text-center md:text-5xl font-bold mb-4" style="color: var(--green-main); letter-spacing: 0.1em;">ВИКТОРИНА</h1>
    <p class="text-xs md:text-sm text-center text-muted" style="letter-spacing: 0.15em; text-transform: uppercase;">Сообщество Game.dev &amp; LatticeLab</p>
</section>

<div class="login-wrap">
    <div class="card">
        <h2 class="text-xl md:text-2xl mb-6 text-center" style="color: var(--green-main); letter-spacing: 0.1em; text-transform: uppercase;">Войти в комнату</h2>
        <input id="code" placeholder="Код комнаты" class="input" maxlength="6" autocomplete="off">
        <input id="name" placeholder="Ваше имя" class="input" maxlength="30" autocomplete="nickname">

        <p class="text-sm text-muted text-center" style="margin-top: 1.5rem; margin-bottom: 1rem; letter-spacing: 0.1em; text-transform: uppercase;">Terminal ID</p>
        <div class="avatar-row">
            <button type="button" class="avatar-btn selected" data-avatar="[A-01]">[A-01]</button>
            <button type="button" class="avatar-btn" data-avatar="[B-02]">[B-02]</button>
            <button type="button" class="avatar-btn" data-avatar="[C-03]">[C-03]</button>
            <button type="button" class="avatar-btn" data-avatar="[D-04]">[D-04]</button>
            <button type="button" class="avatar-btn" data-avatar="[E-05]">[E-05]</button>
            <button type="button" class="avatar-btn" data-avatar="[F-06]">[F-06]</button>
            <button type="button" class="avatar-btn" data-avatar="[G-07]">[G-07]</button>
            <button type="button" class="avatar-btn" data-avatar="[H-08]">[H-08]</button>
            <button type="button" class="avatar-btn" data-avatar="[I-09]">[I-09]</button>
            <button type="button" class="avatar-btn" data-avatar="[J-10]">[J-10]</button>
            <button type="button" class="avatar-btn" data-avatar="[K-11]">[K-11]</button>
            <button type="button" class="avatar-btn" data-avatar="[L-12]">[L-12]</button>
        </div>

        <div class="text-center" style="margin-top: 1.5rem;">
            <button id="join-btn" type="button" class="btn btn-sm btn-primary">Войти</button>
        </div>
    </div>
</div>

{% if request.user.is_superuser %}
<div class="text-center compact-action">
    <button id="host-btn" type="button" class="btn btn-accent host-create-btn">Создать комнату</button>
</div>
{% endif %}

{% endblock %}

{% block extra_js %}
<script>
let selectedAvatar = "[A-01]";

document.querySelectorAll(".avatar-btn").forEach((button) => {
    button.onclick = () => {
        selectedAvatar = button.dataset.avatar;
        document.querySelectorAll(".avatar-btn").forEach((item) => item.classList.remove("selected"));
        button.classList.add("selected");
    };
});

document.getElementById("join-btn").onclick = () => {
    const code = document.getElementById("code").value.toUpperCase().trim();
    const name = document.getElementById("name").value.trim();

    if (code.length !== 6 || !name) {
        alert("Заполните код комнаты и имя");
        return;
    }

    sessionStorage.setItem("name", name);
    sessionStorage.setItem("avatar", selectedAvatar);
    window.location.href = `/lobby/${code}/`;
};

const hostButton = document.getElementById("host-btn");
if (hostButton) {
    hostButton.onclick = async () => {
        const response = await fetch("/api/new-lobby/", { method: "POST" });
        const data = await response.json();
        window.location.href = `/host/${data.code}/`;
    };
}
</script>
{% endblock %}
