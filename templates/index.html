{% extends "base.html" %}
{% block title %}Войти в квиз{% endblock %}
{% block content %}

<h1 class="text-2xl md:text-4xl font-bold mb-6 text-center">Добро пожаловать в викторину</h1>
<p class="text-sm md:text-base mb-6 text-center opacity-60">совместно c ПОСОЛЬСТВО Game.dev и LatticeLab</p>

<div class="card">
    <h2 class="text-xl mb-4">Войти в комнату</h2>
    <input id="code" placeholder="Пароль комнаты" class="input" style="text-transform:uppercase">
    <input id="name" placeholder="Ваше имя" class="input">
    <div class="avatar-row">
        <button class="avatar-btn" data-avatar="🦊">🦊</button>
        <button class="avatar-btn" data-avatar="🐼">🐼</button>
        <button class="avatar-btn" data-avatar="🐸">🐸</button>
        <button class="avatar-btn" data-avatar="🦁">🦁</button>
        <button class="avatar-btn" data-avatar="👾">👾</button>
        <button class="avatar-btn" data-avatar="🐧">🐧</button>
        <button class="avatar-btn" data-avatar="🐺">🐺</button>
        <button class="avatar-btn" data-avatar="🦝">🦝</button>
        <button class="avatar-btn" data-avatar="👽">👽</button>
        <button class="avatar-btn" data-avatar="🦄">🦄</button>
        <button class="avatar-btn" data-avatar="🐲">🐲</button>
        <button class="avatar-btn" data-avatar="🦐">🦐</button>
    </div>
    <button id="join-btn" class="btn btn-primary">Войти</button>
</div>

{% if request.user.is_superuser %}
<div class="card">
    <h2 class="text-xl mb-4">Создать комнату</h2>
    <button id="host-btn" class="btn btn-accent">Создать</button>
</div>
{% endif %}

{% endblock %}

{% block extra_js %}
<script>
let selectedAvatar = "🦊";
document.querySelectorAll(".avatar-btn").forEach(b => {
    b.onclick = () => {
        selectedAvatar = b.dataset.avatar;
        document.querySelectorAll(".avatar-btn").forEach(x => x.classList.remove("selected"));
        b.classList.add("selected");
    };
});

document.getElementById("join-btn").onclick = () => {
    const code = document.getElementById("code").value.toUpperCase().trim();
    const name = document.getElementById("name").value.trim();
    if (code.length !== 6 || !name) { alert("Заполни код и имя"); return; }
    sessionStorage.setItem("name", name);
    sessionStorage.setItem("avatar", selectedAvatar);
    window.location.href = `/lobby/${code}/`;
};

document.getElementById("host-btn").onclick = async () => {
    const r = await fetch("/api/new-lobby/", {method: "POST"});
    const data = await r.json();
    window.location.href = `/host/${data.code}/`;
};
</script>
{% endblock %}
