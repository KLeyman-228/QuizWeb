{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Квиз{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="container">

        <div class="community">
            <h2>Организаторы</h2>

            <div class="discord-card">
                <div class="discord-banner">
                    <span class="discord-banner-placeholder">🎮 Banner 280×80</span>
                </div>
                <div class="discord-card-content">
                    <h3>Quantum Devs</h3>
                    <p>GameDev + Physics</p>
                </div>
                <div class="discord-card-stats">
                    <div class="discord-stat">
                        <div class="discord-stat-number">1.2k</div>
                        <div class="discord-stat-label">Members</div>
                    </div>
                    <div class="discord-stat">
                        <div class="discord-stat-number">🟢</div>
                        <div class="discord-stat-label">Online</div>
                    </div>
                </div>
            </div>

            <div class="discord-card">
                <div class="discord-banner">
                    <span class="discord-banner-placeholder">🎨 Banner 280×80</span>
                </div>
                <div class="discord-card-content">
                    <h3>Shader Lab</h3>
                    <p>Graphics / Rendering</p>
                </div>
                <div class="discord-card-stats">
                    <div class="discord-stat">
                        <div class="discord-stat-number">860</div>
                        <div class="discord-stat-label">Members</div>
                    </div>
                    <div class="discord-stat">
                        <div class="discord-stat-number">🟢</div>
                        <div class="discord-stat-label">Online</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="main">
            <div class="page-container">
                {% block content %}{% endblock %}
            </div>
        </div>

    </div>
</body>
</html>
