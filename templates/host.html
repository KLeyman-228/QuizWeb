{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="host-header">
    <h1 class="text-3xl font-bold">{{ code }}</h1>
    <div class="host-actions">
        <button id="start-btn" class="btn btn-sm btn-success">Начать</button>
        <button id="next-btn" class="btn btn-sm btn-primary hidden">Следующий</button>
        <button id="finish-btn" class="btn btn-sm btn-danger">Завершить</button>
    </div>
</div>

<div id="players" class="players-grid-host"></div>
<div id="question" class="card hidden"></div>
<div id="leaderboard" class="card hidden"></div>

<div class="card">
    <div class="text-sm font-bold mb-2 text-muted">Чат</div>
    <div id="chat-messages" class="chat-messages"></div>
    <div class="chat-input-row">
        <input id="chat-input" type="text" maxlength="200" placeholder="Сообщение..." class="input">
        <button id="chat-send" type="button" class="btn btn-primary">→</button>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>window.LOBBY_CODE = "{{ code }}";</script>
<script src="{% static 'js/host.js' %}"></script>
{% endblock %}
