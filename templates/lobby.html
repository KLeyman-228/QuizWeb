{% extends "base.html" %}
{% load static %}
{% block content %}

<div class="lobby-header-card card">
    <div class="text-muted text-sm mb-1">Код комнаты</div>
    <div class="lobby-code">{{ code }}</div>
    <div class="lobby-waiting-row">
        <span class="lobby-dot"></span>
        <span class="text-muted text-sm" id="player-count">Ожидание игроков...</span>
    </div>
</div>

<div id="players" class="players-grid"></div>
<div id="question" class="card hidden"></div>
<div id="leaderboard" class="card hidden"></div>

<div class="card">
    <div class="text-sm font-bold mb-2 text-muted">Чат</div>
    <div id="chat-messages" class="chat-messages"></div>
    <div class="chat-input-row">
        <input id="chat-input" type="text" maxlength="200" placeholder="Сообщение..." class="input">
        <button id="chat-send" class="btn btn-primary">→</button>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>window.LOBBY_CODE = "{{ code }}";</script>
<script src="{% static 'js/lobby.js' %}"></script>
{% endblock %}
